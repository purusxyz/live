<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Silver metallic gradient -->
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"></stop>
      <stop offset="50%" stop-color="#9ca3af"></stop>
      <stop offset="100%" stop-color="#f3f4f6"></stop>
    </linearGradient>

    <!-- AI glow gradient -->
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"></stop>
      <stop offset="100%" stop-color="#0f172a"></stop>
    </radialGradient>
  </defs>

  <!-- Gear -->
  <g transform="translate(150,150)">
    <circle r="100" fill="url(#silverGradient)"></circle>
    
    <!-- Gear Teeth -->
    <g fill="#9ca3af">
      <rect x="-6" y="-120" width="12" height="24"></rect>
      <rect x="-6" y="96" width="12" height="24"></rect>
      <rect x="-120" y="-6" width="24" height="12"></rect>
      <rect x="96" y="-6" width="24" height="12"></rect>

      <rect x="-6" y="-120" width="12" height="24" transform="rotate(45)"></rect>
      <rect x="-6" y="96" width="12" height="24" transform="rotate(45)"></rect>
      <rect x="-120" y="-6" width="24" height="12" transform="rotate(45)"></rect>
      <rect x="96" y="-6" width="24" height="12" transform="rotate(45)"></rect>
    </g>

    <!-- Inner AI Core -->
    <circle r="60" fill="#111827"></circle>
    <circle r="50" fill="url(#aiGlow)" opacity="0.8"></circle>

    <!-- AI Neural Circuit -->
    <g stroke="#38bdf8" stroke-width="2" fill="none">
      <circle cx="-15" cy="-10" r="3" fill="#38bdf8"></circle>
      <circle cx="20" cy="-20" r="3" fill="#38bdf8"></circle>
      <circle cx="10" cy="15" r="3" fill="#38bdf8"></circle>
      <circle cx="-25" cy="20" r="3" fill="#38bdf8"></circle>

      <line x1="-15" y1="-10" x2="20" y2="-20"></line>
      <line x1="20" y1="-20" x2="10" y2="15"></line>
      <line x1="10" y1="15" x2="-25" y2="20"></line>
      <line x1="-25" y1="20" x2="-15" y2="-10"></line>
    </g>
  </g>
</svg>
